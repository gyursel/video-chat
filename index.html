<!DOCTYPE html>
<html>
<head>
    <title>Simple Video Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <h2>Моят Видео Чат</h2>
    
    <div>
        <p>Твоето ID: <span id="my-id">...</span></p>
        <input type="text" id="remote-id" placeholder="Въведи ID на приятел">
        <button id="call-btn">Обади се</button>
    </div>

    <div class="video-container">
        <video id="local-video" autoplay muted></video> <video id="remote-video" autoplay></video> </div>

    <script src="script.js"></script>
</body>
</html>
